<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漢字練習アプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f9f9f9; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .canvas-container { position: relative; width: 600px; height: 150px; margin: 20px auto; border: 2px solid #ccc; background: #fff; touch-action: none; }
        #canvas { position: absolute; top: 0; left: 0; z-index: 2; cursor: crosshair; }
        #question-text { font-size: 1.8rem; margin-bottom: 20px; font-weight: bold; }
        #answer-display { font-size: 2.5rem; color: #d32f2f; margin: 20px 0; min-height: 3rem; font-weight: bold; }
        button { font-size: 1.2rem; padding: 10px 20px; cursor: pointer; margin: 5px; }
        
        /* 修正した下線スタイル */
        .blank {
            border-bottom: 3px solid #333;
            display: inline-block;
            min-width: 40px;
            text-align: center;
            margin: 0 5px;
            padding-bottom: 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="question-text">読み込み中...</div>
    <div class="canvas-container">
        <canvas id="canvas" width="600" height="150"></canvas>
    </div>
    
    <div id="answer-display"></div>
    
    <div>
        <button onclick="showAnswer()">答えを見る</button>
        <button onclick="clearCanvas()">消す</button>
        <button onclick="nextQuestion()">次の問題</button>
    </div>
    <div>
        <label>ペンの太さ: </label>
        <input type="range" id="pen-size" min="2" max="20" value="6" oninput="updatePenSize(this.value)">
    </div>
</div>

<script>
    let questions = [];
    let currentIndex = 0;
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const qText = document.getElementById('question-text');
    const aDisplay = document.getElementById('answer-display');

    // 1. データ読み込み
    async function loadCSV() {
        const webAppUrl = 'https://script.google.com/macros/s/AKfycbyp3nn8x69YijZ8WBadZGhm2QZVxUfpSqjlG7WsJE4QTWT9ppVUrVJyKaj9gcOyQw/exec';
        
        try {
            const response = await fetch(webAppUrl);
            const data = await response.text();
            
            const rows = data.split('\n').filter(row => row.trim() !== "").slice(1);
            questions = rows.map(row => {
                const cols = row.split(',');
                // CSVの列: 0:No, 1:p1, 2:prob(読み), 3:p2, 4:答え
                return { 
                    p1: cols[1], 
                    prob: cols[2], 
                    p2: cols[3], 
                    a: cols[4].trim() 
                };
            });

            // シャッフル
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }

            loadQuestion();
        } catch (error) {
            qText.innerText = "読み込みエラーです。";
        }
    }

    // 2. 画面操作
    function loadQuestion() {
        if (questions.length === 0) return;
        const item = questions[currentIndex];
        
        // 下線の中に「読み（item.prob）」を表示する構成
        qText.innerHTML = ` ${item.p1}<span class="blank">${item.prob}</span>${item.p2}`;
        aDisplay.innerText = "";
        clearCanvas();
    }

    function showAnswer() {
        aDisplay.innerText = "答え: " + questions[currentIndex].a;
    }

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function nextQuestion() {
        currentIndex = (currentIndex + 1) % questions.length;
        loadQuestion();
    }

    // 3. 描画初期化
    ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.strokeStyle = '#333';

    function updatePenSize(size) {
        ctx.lineWidth = size;
    }

    let drawing = false;
    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    });

    canvas.addEventListener('touchstart', (e) => { drawing = true; e.preventDefault(); });
    canvas.addEventListener('touchend', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('touchmove', (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
        ctx.stroke();
        e.preventDefault();
    });

    loadCSV();
</script>
</body>
</html>
